# ============================================================
#  application.properties — Configuración de la aplicación
# ============================================================
#
# Este archivo configura el comportamiento de Spring Boot.
# IMPORTANTE: Antes de ejecutar el proyecto, debes cambiar
# los valores de datasource según tu entorno local.
# ============================================================

# Nombre de la aplicación (usado en logs y actuator)
spring.application.name=Nexus

# ------------------------------------------------------------
# CONFIGURACIÓN DE LA BASE DE DATOS (MySQL)
# ------------------------------------------------------------
# URL de conexión a MySQL:
#   - localhost:3306  → dirección y puerto de tu MySQL local
#   - nexus           → nombre de la base de datos (se crea automáticamente
#                       gracias a createDatabaseIfNotExist=true)
#   - useSSL=false    → desactiva SSL para desarrollo local
#   - serverTimezone=UTC → evita problemas de zona horaria
#   - allowPublicKeyRetrieval=true → requerido por versiones recientes de MySQL
#   - createDatabaseIfNotExist=true → crea la BD si no existe al conectar
spring.datasource.url=jdbc:mysql://localhost:3306/nexus?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true

# ⚠ CAMBIAR ESTOS VALORES según tu instalación de MySQL:
# Usuario de MySQL con permisos sobre la base de datos "nexus"
spring.datasource.username=Pruebas

# Contraseña del usuario de MySQL indicado arriba
spring.datasource.password=Pruebas1234

# ------------------------------------------------------------
# CONFIGURACIÓN DE JPA / HIBERNATE
# ------------------------------------------------------------
# Estrategia de actualización del esquema de la BD:
#   update → Hibernate crea o actualiza las tablas automáticamente
#            según los cambios en las entidades (@Entity).
#            ¡No elimina datos existentes!
#   create → Crea las tablas desde cero cada vez que arranca (borra datos).
#   validate → Solo valida que las tablas existan (no modifica nada).
#   none   → No hace nada con el esquema.
spring.jpa.hibernate.ddl-auto=update

# Muestra las queries SQL generadas por Hibernate en la consola.
# Útil para aprender y depurar. En producción se suele desactivar (false).
spring.jpa.show-sql=true

# Dialecto de SQL: le dice a Hibernate que use la sintaxis de MySQL.
# Hibernate soporta múltiples motores de BD; este parámetro indica cuál.
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
